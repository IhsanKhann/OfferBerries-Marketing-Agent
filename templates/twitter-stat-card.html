<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Twitter Stat Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --brand-primary: #4B0082;
    --sidebar-dark: #0F172A;
    --text-secondary: #64748B;
    --font-display: 'Plus Jakarta Sans', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1600px; height: 900px; overflow: hidden; font-family: var(--font-display); background: var(--sidebar-dark); }
  .card {
    width: 1600px; height: 900px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 80px;
  }
  .badge {
    position: absolute;
    top: 48px;
    right: 64px;
    font-size: 13px;
    font-weight: 700;
    color: var(--brand-primary);
    background: rgba(75,0,130,0.15);
    border: 1px solid rgba(75,0,130,0.4);
    padding: 6px 16px;
    border-radius: 20px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .stat-value {
    font-size: 140px;
    font-weight: 800;
    color: var(--brand-primary);
    line-height: 1;
    margin-bottom: 24px;
    letter-spacing: -0.02em;
  }
  .stat-label {
    font-size: 28px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    text-align: center;
    margin-bottom: 20px;
    max-width: 900px;
    line-height: 1.3;
  }
  .context {
    font-size: 18px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    text-align: center;
    max-width: 700px;
    line-height: 1.5;
  }
  .source {
    position: absolute;
    bottom: 48px;
    left: 64px;
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    font-weight: 400;
    letter-spacing: 0.04em;
  }
  .top-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--brand-primary), #6366F1);
  }
</style>
</head>
<body>
<div class="card">
  <div class="top-line"></div>
  <div class="badge">OfferBerries</div>
  <div class="stat-value" id="stat-value">94%</div>
  <div class="stat-label" id="stat-label">of Pakistani SMBs waste time on manual payroll</div>
  <div class="context" id="context">OfferBerries automates payroll in minutes, not days</div>
  <div class="source" id="source">Source: OfferBerries SMB Survey 2026</div>
</div>
<script>
  const d = window.CONTENT_DATA || {};
  document.getElementById('stat-value').textContent = d.stat_value || '94%';
  document.getElementById('stat-label').textContent = d.stat_label || 'of Pakistani SMBs face payroll challenges';
  document.getElementById('context').textContent = d.context || 'OfferBerries makes it simple.';
  document.getElementById('source').textContent = d.source || 'OfferBerries SMB Survey 2026';
</script>
</body>
</html>

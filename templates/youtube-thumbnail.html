<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Thumbnail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --brand-primary: #4B0082;
    --sidebar-dark: #0F172A;
    --text-primary: #1E293B;
    --surface: #FFFFFF;
    --font-display: 'Plus Jakarta Sans', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 720px; overflow: hidden; font-family: var(--font-display); }
  .card {
    width: 1280px; height: 720px;
    display: flex;
    position: relative;
  }
  .left {
    width: 768px;
    background: linear-gradient(135deg, var(--brand-primary) 0%, #1a0040 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px 72px;
    position: relative;
  }
  .left-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.2);
  }
  .hook {
    font-size: 64px;
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
    max-width: 600px;
  }
  .sub-label {
    font-size: 28px;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
    line-height: 1.3;
    position: relative;
    z-index: 1;
  }
  .right {
    flex: 1;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    position: relative;
  }
  .mockup-placeholder {
    width: 100%;
    flex: 1;
    background: #F1F5F9;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px dashed #CBD5E1;
    margin-bottom: 20px;
  }
  .mockup-label {
    font-size: 14px;
    color: #94A3B8;
    font-weight: 500;
  }
  .watch-badge {
    padding: 10px 24px;
    background: var(--brand-primary);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    border-radius: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .bottom-strip {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40px;
    background: var(--sidebar-dark);
    display: flex;
    align-items: center;
    padding: 0 40px;
    gap: 12px;
  }
  .brand-label {
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .brand-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--brand-primary);
  }
  .brand-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
  }
</style>
</head>
<body>
<div class="card">
  <div class="left">
    <div class="left-overlay"></div>
    <div class="hook" id="hook-text">Stop wasting 3 days on payroll</div>
    <div class="sub-label" id="sub-label-text">See how Pakistani SMBs cut admin work by 80%</div>
  </div>
  <div class="right">
    <div class="mockup-placeholder">
      <div class="mockup-label">Product UI</div>
    </div>
    <div class="watch-badge">Watch Now ▶</div>
    <div class="bottom-strip">
      <div class="brand-label">OfferBerries</div>
      <div class="brand-dot"></div>
      <div class="brand-sub">ERP for Pakistani SMBs</div>
    </div>
  </div>
</div>
<script>
  const d = window.CONTENT_DATA || {};
  document.getElementById('hook-text').textContent = d.hook || 'Stop Wasting Time on Manual Work';
  document.getElementById('sub-label-text').textContent = d.sub_label || 'See the OfferBerries difference';
</script>
</body>
</html>

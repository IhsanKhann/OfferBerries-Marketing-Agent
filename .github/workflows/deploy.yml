name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Sync + rebuild
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HETZNER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Diagnose server state
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.HETZNER_IP }} \
            "echo '=== Running containers ===' && docker ps --format '{{.Names}}\t{{.Status}}\t{{.Ports}}' && echo '=== /root contents ===' && ls /root/ && echo '=== Compose projects ===' && docker compose ls 2>/dev/null || true"

      - name: Sync code to server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.HETZNER_IP }} \
            "find /root -maxdepth 2 -name docker-compose.yml 2>/dev/null | head -5"

          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='*.sock' \
            --filter='protect .env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ root@${{ secrets.HETZNER_IP }}:/root/offerberries-marketing-agent/

      # script_stop: false keeps all output visible even when commands fail.
      # Actual CI failure is caught by the "Verify deploy" curl step below.
      - name: Build and restart containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_IP }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 15m
          script_stop: false
          script: |
            set -euo pipefail

            # Find compose project dir
            PROJ=""
            for d in /root/offerberries-marketing-agent /root; do
              if [ -f "$d/docker-compose.yml" ]; then
                PROJ="$d"
                break
              fi
            done
            if [ -z "$PROJ" ]; then
              echo "ERROR: no docker-compose.yml found in /root or /root/offerberries-marketing-agent"
              exit 1
            fi

            echo "=== Project dir: $PROJ ==="
            cd "$PROJ"

            # Ensure .env exists
            if [ ! -f .env ] && [ -f /root/.env ]; then
              echo "Linking /root/.env -> .env"
              ln -sf /root/.env .env
            fi
            [ ! -f .env ] && echo "WARNING: no .env file found"

            echo "=== Disk / memory before build ==="
            df -h / && free -h

            echo "=== Building services ==="
            docker compose build mcp-server  2>&1
            docker compose build crew-runner 2>&1
            docker compose build dashboard   2>&1
            docker compose build renderer    2>&1

            echo "=== Stopping compose project ==="
            docker compose down --remove-orphans 2>&1 || true

            echo "=== Killing any container still holding our ports ==="
            for PORT in 443 9080 3000 3001 3002 5678 7456 8000 8001; do
              HOLDER=$(docker ps -q --filter "publish=${PORT}" 2>/dev/null || true)
              if [ -n "$HOLDER" ]; then
                echo "  Port ${PORT} still held — stopping"
                docker stop "$HOLDER" 2>/dev/null || true
              fi
            done

            echo "=== Starting fresh ==="
            docker compose up -d

            echo "=== Waiting 75s for services to become healthy ==="
            sleep 75

            echo "=== Service status ==="
            docker compose ps

            echo "=== MCP health ==="
            curl -sf http://localhost:8000/health && echo ""

            echo "=== Dashboard health ==="
            curl -sf http://localhost:3002/api/health && echo ""

            echo "=== MCP routes ==="
            curl -sf http://localhost:8000/openapi.json \
              | python3 -c "import sys,json; paths=json.load(sys.stdin)['paths']; print(sorted(paths.keys()))" \
              || echo "WARNING: openapi.json not yet available"

            echo ""
            echo "=== Deploy complete at $(date -u) ==="

      # This step runs from the GitHub Actions runner and hits the PUBLIC URL.
      # It fails the whole CI job if the site isn't actually serving traffic,
      # regardless of what the SSH script reported.
      - name: Verify deploy (public health check)
        run: |
          echo "Waiting 15s for Caddy to route traffic..."
          sleep 15
          curl -sf --max-time 15 https://agent.${{ secrets.HETZNER_DOMAIN }}/api/health \
            && echo "Dashboard is live" \
            || (echo "FAIL: https://agent.${{ secrets.HETZNER_DOMAIN }}/api/health did not return 200" && exit 1)

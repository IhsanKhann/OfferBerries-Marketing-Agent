name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Sync + rebuild
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HETZNER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Diagnose server state
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.HETZNER_IP }} \
            "echo '=== Running containers ===' && docker ps --format '{{.Names}}\t{{.Status}}\t{{.Ports}}' && echo '=== /root contents ===' && ls /root/ && echo '=== Compose projects ===' && docker compose ls 2>/dev/null || true"

      - name: Sync code to original project directory
        run: |
          # Sync to /root/ directly (where the original project lives based on
          # docker network name offerberries-marketing-agent_marketing-net).
          # The project dir name determines compose project name. We check
          # which location has docker-compose.yml and sync there.
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.HETZNER_IP }} \
            "find /root -maxdepth 2 -name docker-compose.yml 2>/dev/null | head -5"

          # Rsync to whichever path has the compose file (or /root/ directly)
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='*.sock' \
            --filter='protect .env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ root@${{ secrets.HETZNER_IP }}:/root/offerberries-marketing-agent/

      - name: Build and restart containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_IP }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 15m
          script_stop: true
          script: |
            set -e

            # Find the compose project directory
            PROJ=""
            for d in /root/offerberries-marketing-agent /root; do
              if [ -f "$d/docker-compose.yml" ]; then
                PROJ="$d"
                break
              fi
            done
            [ -z "$PROJ" ] && echo "ERROR: no docker-compose.yml found" && exit 1

            echo "=== Project dir: $PROJ ==="
            cd "$PROJ"

            # Ensure .env exists (copy from /root/.env if needed)
            if [ ! -f .env ] && [ -f /root/.env ]; then
              echo "Linking /root/.env -> .env"
              ln -sf /root/.env .env
            fi
            [ ! -f .env ] && echo "WARNING: no .env file found"

            echo "=== Disk / memory before build ==="
            df -h / && free -h

            echo "=== Building services ==="
            FAILS=""
            docker compose build mcp-server   2>&1 || FAILS="$FAILS mcp-server"
            docker compose build crew-runner  2>&1 || FAILS="$FAILS crew-runner"
            docker compose build dashboard    2>&1 || FAILS="$FAILS dashboard"
            docker compose build renderer     2>&1 || FAILS="$FAILS renderer"

            [ -n "$FAILS" ] && echo "BUILD FAILED:$FAILS" && exit 1

            echo "=== Stopping compose project ==="
            docker compose down --remove-orphans 2>&1 || true

            echo "=== Killing any container still holding our ports ==="
            for PORT in 443 9080 3000 3001 3002 5678 7456 8000 8001; do
              HOLDER=$(docker ps -q --filter "publish=${PORT}" 2>/dev/null)
              if [ -n "$HOLDER" ]; then
                echo "  Port ${PORT} still held by $(docker inspect --format '{{.Name}}' $HOLDER) — stopping"
                docker stop $HOLDER 2>/dev/null || true
              fi
            done

            echo "=== Starting fresh ==="
            docker compose up -d 2>&1
            UP_EXIT=$?
            [ $UP_EXIT -ne 0 ] && echo "docker compose up failed (exit $UP_EXIT)" && exit 1

            echo "=== Waiting 60s for health checks ==="
            sleep 60

            echo "=== Service status ==="
            docker compose ps

            echo "=== MCP endpoints (proves new code) ==="
            curl -sf http://localhost:8000/openapi.json \
              | python3 -c "import sys,json; paths=json.load(sys.stdin)['paths']; print(sorted(paths.keys()))" \
              || echo "MCP not responding"

            echo "=== MCP health ==="
            curl -sf http://localhost:8000/health && echo ""

            echo "=== Dashboard health ==="
            curl -sf http://localhost:3002/api/health && echo "" || echo "Dashboard not responding yet"

            echo ""
            echo "=== Deploy complete at $(date -u) ==="

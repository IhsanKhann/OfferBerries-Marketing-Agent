name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Sync + rebuild
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HETZNER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Ensure project directory exists on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.HETZNER_IP }} \
            "mkdir -p /root/offerberries-marketing-agent"

      - name: Sync code to Hetzner (rsync)
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='*.sock' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ root@${{ secrets.HETZNER_IP }}:/root/offerberries-marketing-agent/

      - name: Build and restart containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_IP }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 15m
          script_stop: false
          script: |
            cd /root/offerberries-marketing-agent

            echo "=== DIAGNOSTICS ==="
            df -h /
            free -h
            echo "Running containers:"
            docker ps --format "{{.Names}} {{.Status}}" 2>/dev/null || true

            echo ""
            echo "=== FREE DISK (prune old images) ==="
            docker image prune -f 2>/dev/null || true

            echo ""
            echo "=== FILES CHECK ==="
            ls -la dashboard/next.config.js dashboard/public/ agent/mcp_server/main.py 2>&1

            FAILURES=""

            echo ""
            echo "=== BUILD mcp-server ==="
            docker compose build mcp-server 2>&1
            [ $? -ne 0 ] && FAILURES="$FAILURES mcp-server"

            echo ""
            echo "=== BUILD crew-runner ==="
            docker compose build crew-runner 2>&1
            [ $? -ne 0 ] && FAILURES="$FAILURES crew-runner"

            echo ""
            echo "=== BUILD dashboard ==="
            docker compose build dashboard 2>&1
            [ $? -ne 0 ] && FAILURES="$FAILURES dashboard"

            echo ""
            echo "=== BUILD renderer ==="
            docker compose build renderer 2>&1
            [ $? -ne 0 ] && FAILURES="$FAILURES renderer"

            if [ -n "$FAILURES" ]; then
              echo ""
              echo "!!! BUILD FAILED for:$FAILURES"
              exit 1
            fi

            echo ""
            echo "=== All builds OK — starting services ==="
            docker compose up -d --remove-orphans
            sleep 60

            echo "=== Service status ==="
            docker compose ps

            echo "=== MCP health ==="
            curl -sf http://localhost:8000/health && echo "" || echo "MCP not responding"

            echo "=== Dashboard health ==="
            curl -sf http://localhost:3002/api/health && echo "" || echo "Dashboard not responding"

            echo ""
            echo "=== Deploy complete at $(date -u) ==="

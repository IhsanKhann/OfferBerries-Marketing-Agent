name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Sync + rebuild
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HETZNER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Ensure project directory exists on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.HETZNER_IP }} \
            "mkdir -p /root/offerberries-marketing-agent"

      - name: Sync code to Hetzner (rsync)
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='*.sock' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ root@${{ secrets.HETZNER_IP }}:/root/offerberries-marketing-agent/

      - name: Build and restart containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_IP }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 15m
          script_stop: true
          script: |
            set -e
            cd /root/offerberries-marketing-agent

            echo ">>> Code version:"
            ls -la dashboard/next.config.js agent/mcp_server/main.py

            echo ">>> Rebuilding containers..."
            docker compose build --no-cache mcp-server crew-runner dashboard renderer

            echo ">>> Restarting services..."
            docker compose up -d --remove-orphans

            echo ">>> Waiting 60s for health checks..."
            sleep 60

            echo ">>> Container status:"
            docker compose ps

            echo ">>> MCP health:"
            curl -sf http://localhost:8000/health && echo ""

            echo ">>> Dashboard health:"
            curl -sf http://localhost:3002/api/health && echo "" || true

            echo ""
            echo "=== Deploy complete at $(date -u) ==="
